name: quality

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Bootstrap env files
        run: make bootstrap

      - name: Test
        run: make test

      - name: Build
        run: make build
