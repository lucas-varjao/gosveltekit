# Build the frontend image with VITE_API_URL="" for same-origin ingress routing,
# or replace it with the public backend URL before deploying.
---
apiVersion: v1
kind: Namespace
metadata:
  name: gosveltekit
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gosveltekit-config
  namespace: gosveltekit
data:
  SERVER_PORT: "8080"
  AUTH_SESSION_TTL: "720h"
  AUTH_REFRESH_THRESHOLD: "360h"
  AUTH_MAX_FAILED_ATTEMPTS: "5"
  AUTH_LOCKOUT_DURATION: "30m"
  AUTH_ALLOW_HEADER_AUTH: "true"
  AUTH_ALLOW_COOKIE_AUTH: "true"
  AUTH_COOKIE_SECURE: "true"
  EMAIL_SMTP_HOST: "smtp.example.com"
  EMAIL_SMTP_PORT: "587"
  EMAIL_FROM_EMAIL: "no-reply@example.com"
  EMAIL_FROM_NAME: "GoSvelteKit"
  EMAIL_RESET_URL: "https://gosveltekit.local/reset-password?token="
---
apiVersion: v1
kind: Secret
metadata:
  name: gosveltekit-secrets
  namespace: gosveltekit
type: Opaque
stringData:
  DATABASE_DSN: "postgresql://gosvelte:change-me@postgresql.default.svc.cluster.local:5432/gosveltekit?sslmode=disable"
  EMAIL_SMTP_USERNAME: "change-me"
  EMAIL_SMTP_PASSWORD: "change-me"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gosveltekit-backend
  namespace: gosveltekit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gosveltekit-backend
  template:
    metadata:
      labels:
        app: gosveltekit-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/gosveltekit-backend:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: gosveltekit-config
            - secretRef:
                name: gosveltekit-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gosveltekit-backend
  namespace: gosveltekit
spec:
  selector:
    app: gosveltekit-backend
  ports:
    - name: http
      port: 8080
      targetPort: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gosveltekit-frontend
  namespace: gosveltekit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gosveltekit-frontend
  template:
    metadata:
      labels:
        app: gosveltekit-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/your-org/gosveltekit-frontend:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gosveltekit-frontend
  namespace: gosveltekit
spec:
  selector:
    app: gosveltekit-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gosveltekit
  namespace: gosveltekit
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
spec:
  ingressClassName: nginx
  rules:
    - host: gosveltekit.local
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: gosveltekit-backend
                port:
                  number: 8080
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gosveltekit-backend
                port:
                  number: 8080
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: gosveltekit-backend
                port:
                  number: 8080
          - path: /ping
            pathType: Prefix
            backend:
              service:
                name: gosveltekit-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gosveltekit-frontend
                port:
                  number: 80
